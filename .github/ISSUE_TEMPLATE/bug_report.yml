name: 🐛 Bug Report
description: File a bug report to help us improve Abelo
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please be as detailed as possible.

  - type: input
    id: version
    attributes:
      label: Abelo Version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: android_version
    attributes:
      label: Android Version
      placeholder: "e.g. Android 14 (API 34)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack Trace (if any)
      render: shell
