name: taar
description: Taar — Hear Everything. JioSaavn-powered music player (mobile).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  http: ^1.2.1
  pointycastle: ^3.9.1
  home_widget: ^0.6.0
  just_audio: ^0.9.40
  audio_session: ^0.1.21
  shared_preferences: ^2.2.3
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  marquee: ^2.2.3
  share_plus: 10.1.4
  dio: ^5.4.3
  dart_des: ^1.0.0
  path_provider: ^2.1.2
  media_store_plus: ^0.1.3
  permission_handler: ^11.3.1
  just_audio_background: ^0.0.1-beta.12
  file_picker: ^8.0.0        # file import picker
  path: ^1.9.0   
  audio_info: ^0.0.6
  flutter_audio_tagger: ^5.1.3
  url_launcher: ^6.3.0
  video_player: ^2.6.0
  youtube_explode_dart: ^3.1.0
  googleapis: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#4A00E0"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true